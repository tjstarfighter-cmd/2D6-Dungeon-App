<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>2D6 Dungeon Companion</title>
    <script>
      // GitHub Pages SPA fallback (rafgraph technique). Any unknown path
      // under /2D6-Dungeon-App/ lands here. We redirect to the app root
      // with the original path encoded in the query string; index.html's
      // companion script restores it before React Router boots.
      var pathSegmentsToKeep = 1; // 2D6-Dungeon-App
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
